name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  next:
    name: Next.js build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24.x
        uses: actions/setup-node@v7
        with:
          node-version: "24.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  dbt:
    name: Goose migrations and dbt parse
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Use Go 1.24.x
        uses: actions/setup-go@v7
        with:
          go-version: "1.24.x"

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.25.0

      - name: Validate Goose migrations
        run: goose -dir migrations validate

      - name: Use Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dbt.txt

      - name: Install dbt dependencies
        run: python -m pip install -r requirements-dbt.txt

      - name: Parse dbt project
        run: dbt parse --profiles-dir dbt

  tests:
    name: Query integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Go 1.24.x
        uses: actions/setup-go@v7
        with:
          go-version: "1.24.x"
      - uses: actions/setup-node@v7
        with:
          node-version: "24.x"
          cache: npm
      - run: npm ci
      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.25.0
      - name: Apply ClickHouse migrations
        run: ./scripts/migrate.sh up
        env:
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      - name: Run query tests
        run: npm test
        env:
          CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
