name: Release

# Manual-dispatch release: analyzes conventional commits (feat/fix/…) since the
# last tag, bumps the version, writes CHANGELOG.md, and cuts a GitHub Release.
# Deploys are handled separately by cd.yml (migrations + Trigger.dev) and Vercel's
# git integration — this workflow only versions + records the release.
on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # push the version commit + tag, create the release
  issues: write          # comment on released issues
  pull-requests: write   # comment on released PRs

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0            # semantic-release needs full history + tags
          persist-credentials: true

      - name: Use Node.js 24.x
        uses: actions/setup-node@v7
        with:
          node-version: "24.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
