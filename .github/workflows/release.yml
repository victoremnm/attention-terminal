name: Release

# Auto-release on every push to main (merge) + manual dispatch.
# Analyzes conventional commits since the last tag, bumps the version,
# writes CHANGELOG.md, and cuts a GitHub Release with a version tag.
#
# Does NOT push to main (branch is protected — PRs only).
# The @semantic-release/git plugin is intentionally omitted; the version
# bump in package.json is not committed to the branch. The GitHub Release
# tag provides the versioning + rollback point.
#
# Every commit type triggers at least a patch release, so every deploy
# has a version tag for rollback. feat/fix/refactor/perf → minor.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # create the tag + GitHub Release
  issues: write          # comment on released issues
  pull-requests: write   # comment on released PRs

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0            # semantic-release needs full history + tags
          persist-credentials: true

      - name: Use Node.js 24.x
        uses: actions/setup-node@v7
        with:
          node-version: "24.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release