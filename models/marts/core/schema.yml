version: 2

models:
  - name: dim_source
    description: "Conformed source dimension for talk, code, and model feeds."
    columns:
      - name: source_id
        tests: [not_null, unique]
      - name: source_family
        description: "Analytical family: talk, code, or model."

  - name: dim_repo
    description: "Repository dimension conformed from GH Archive events."
    columns:
      - name: repo_key
        tests: [not_null, unique]
      - name: repo_name
        tests: [not_null]

  - name: dim_huggingface_model
    description: "Latest known Hugging Face model attributes by model_id."
    columns:
      - name: model_key
        tests: [not_null, unique]
      - name: model_id
        tests: [not_null]

  - name: fact_talk_activity_hourly
    description: "Hourly Hacker News activity facts deduped to current item state before aggregation."
    columns:
      - name: activity_hour
        tests: [not_null]
      - name: source_id
        tests: [not_null]
      - name: comment_count
        description: "Latest known descendants summed once per HN item; avoids ReplacingMergeTree reinsertion double-counting."

  - name: fact_code_activity_hourly
    description: "Hourly GitHub repository activity facts from the ClickHouse rollup."
    columns:
      - name: activity_hour
        tests: [not_null]
      - name: repo_key
        tests: [not_null]

  - name: fact_repo_activity_daily
    description: "Daily GitHub repository trend facts for stars, forks, commits, PRs, issues, releases, and repo/ref creates."
    columns:
      - name: activity_date
        tests: [not_null]
      - name: repo_key
        tests: [not_null]

  - name: fact_repo_activity_monthly
    description: "Monthly GitHub repository trend facts for longer-range ranking and time-series views."
    columns:
      - name: activity_month
        tests: [not_null]
      - name: repo_key
        tests: [not_null]

  - name: fact_model_activity_daily
    description: "Daily Hugging Face model attention facts from hourly scans."
    columns:
      - name: activity_date
        tests: [not_null]
      - name: model_key
        tests: [not_null]

  - name: mart_attention_source_hourly
    description: "Unified hourly attention mart for source-level comparisons."
    columns:
      - name: activity_hour
        tests: [not_null]
      - name: source_id
        tests: [not_null]
      - name: comment_count
        description: "HN comment count for talk rows; zero for non-comment-counted sources."

  - name: mart_repo_activity_timeseries
    description: "Unified daily/monthly GitHub repo activity time series with comparable trend measures."
    columns:
      - name: grain
        tests: [not_null]
      - name: period_start
        tests: [not_null]
      - name: repo_key
        tests: [not_null]
