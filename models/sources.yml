version: 2

sources:
  - name: raw
    schema: "{{ target.schema }}"
    database: raw
    description: "Append-only or engine-managed source tables owned by Goose migrations and Trigger.dev ingestion tasks."
    tables:
      - name: hackernews
        description: "Raw Hacker News item records, reinserted as scores/comments change."
      - name: github_events
        description: "Raw GH Archive events with extracted activity measures."
      - name: hf_model_snapshots
        description: "Hourly Hugging Face model scan snapshots."
  - name: default
    schema: "{{ target.schema }}"
    database: default
    description: "Aggregate and compatibility tables managed by ClickHouse rollups and views."
    tables:
      - name: hn_hourly
        description: "Incremental ClickHouse rollup of Hacker News activity."
      - name: gh_repo_hourly
        description: "Incremental ClickHouse rollup of GitHub repo activity."
      - name: gh_repo_daily
        description: "Incremental ClickHouse daily rollup of GitHub repo activity measures."
      - name: gh_repo_monthly
        description: "Incremental ClickHouse monthly rollup of GitHub repo activity measures."
      - name: gh_repo_activity_feed
        description: "Thin compatibility view over github_events for repo drill-down and ad-hoc agent SQL."
      - name: ingest_log
        description: "Ingestion watermarks and freshness metadata."
