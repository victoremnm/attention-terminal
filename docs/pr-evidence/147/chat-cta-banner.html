<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PR #147 — Chat CTA banner preview</title>
  <style>
    :root { color-scheme: dark; --s:#14171a; --panel:#191d21; --ink:#cdd6dd; --line:rgba(255,255,255,.16); --muted:rgba(255,255,255,.42); --cyan:#38cdec; --mono:ui-monospace,SFMono-Regular,Menlo,monospace; }
    * { box-sizing: border-box; }
    body { margin:0; padding:32px; background:var(--s); color:var(--ink); font:14px system-ui,sans-serif; }
    main { max-width:760px; margin:auto; }
    .label { color:var(--muted); font:11px var(--mono); letter-spacing:.12em; text-transform:uppercase; }
    .banner { margin-top:18px; padding:16px; border:1px solid var(--line); border-radius:8px; background:var(--panel); display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .copy { display:flex; align-items:center; gap:12px; }
    .icon { font-size:20px; }
    h1 { margin:0; font:600 14px var(--mono); }
    p { margin:2px 0 0; color:var(--muted); font-size:12px; }
    a { padding:8px 16px; border:1px solid rgba(56,205,236,.3); border-radius:4px; color:var(--cyan); background:rgba(0,200,240,.08); font:600 12px var(--mono); text-decoration:none; white-space:nowrap; }
    @media (max-width:560px) { body { padding:16px; } .banner { align-items:flex-start; flex-direction:column; } }
  </style>
</head>
<body>
  <main>
    <div class="label">PR #147 · /trending · /skinny · /repo-rankings</div>
    <section class="banner" aria-label="Attention Terminal chat call to action">
      <div class="copy">
        <span class="icon" aria-hidden="true">💬</span>
        <div><h1>ATTENTION AGENT READY</h1><p>Ask questions, request deep queries, or explore repository insights.</p></div>
      </div>
      <a href="/chat">Open Terminal Chat →</a>
    </section>
  </main>
</body>
</html>
